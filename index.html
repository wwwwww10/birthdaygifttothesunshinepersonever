<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For a rare soul</title>

<style>
body {
    margin: 0;
    padding: 0;
    height: 100vh;
    font-family: 'Georgia', serif;
    overflow: hidden;
}

#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 22px;
    text-align: center;
    cursor: pointer;
    z-index: 10;
}

#main {
    display: none;
    height: 100vh;
    background: url('https://i.postimg.cc/WpDspGT7/IMG-1640.jpg') no-repeat center/cover;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
}

/* blur overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(5px);
    background: rgba(255,255,255,0.3);
}
.container {
    position: relative;
    background: rgba(255,255,255,0.6);
    padding: 40px;
    border-radius: 20px;
    max-width: 700px;
    z-index: 1;
}

#text {
    font-size: 20px;
    line-height: 1.8;
    white-space: pre-line;
}
</style>
</head>

<body>

<!-- intro -->
<div id="intro" onclick="startExperience()">
    Tap for a surprise... 💌<br>
    <small>only made for you</small>
</div>

<!-- main content -->
<div id="main">
    <div class="overlay"></div>

    <div class="container">
        <div id="text"></div>
    </div>
</div>

<!-- music -->
<audio id="bg-music" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/25/audio_946f3bcd54.mp3" type="audio/mpeg">
</audio>

<script>
const message = `To a rare soul...

In a world full of noise, your light stays clear.
Some people pass by.
Some people remain in memory.
You are the second kind.

May your heart stay soft,
your mind stay strong,
and your path stay bright.

Keep blooming.
Keep rising.
Keep becoming more of who you are.

May this year bring quiet victories,
deep peace, and beautiful surprises.

Happy Birthday.

You are unforgettable.`;

// typing
let i = 0;
const speed = 40;

function typeWriter() {
    if (i < message.length) {
        document.getElementById("text").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
    }
}

// start experience
function startExperience() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "flex";

    document.getElementById("bg-music").play();
    typeWriter();
}
</script>

</body>
</html>
